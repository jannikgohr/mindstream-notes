<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mindstream Notes</title>
    <link rel="icon" href="/favicon.ico" type="image/png" />
    <script>
      // Apply theme before paint to avoid a flash of the wrong colour scheme.
      (function () {
        try {
          const stored = localStorage.getItem('mode-watcher-mode');
          const prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          const useDark =
            stored === 'dark' || (stored !== 'light' && prefersDark);
          document.documentElement.classList.toggle('dark', useDark);
        } catch (_) {
          /* no-op */
        }
      })();
    </script>
    <style>
      /*
       * Bootstrap background colours so the very first paint matches the
       * active theme. app.css, dockview, and Crepe stylesheets all load
       * after this point; without these rules the WebView shows its default
       * white between window-create and CSS-ready, which is a "flashbang"
       * for dark-mode users. Values mirror the --background tokens from
       * app.css verbatim so the cross-fade is invisible.
       */
      :root {
        background-color: oklch(1 0 0);
        color: oklch(0.145 0 0);
      }
      :root.dark {
        background-color: oklch(0.145 0 0);
        color: oklch(0.985 0 0);
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full bg-background text-foreground antialiased">
    <div style="display: contents" class="h-full">%sveltekit.body%</div>
  </body>
</html>
