<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Mindstream Notes</title>
    <link rel="icon" href="/favicon.ico" type="image/png" />
    <script>
      // Apply theme before paint to avoid a flash of the wrong colour scheme.
      (function () {
        try {
          const stored = localStorage.getItem('mode-watcher-mode');
          const prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          const useDark =
            stored === 'dark' || (stored !== 'light' && prefersDark);
          document.documentElement.classList.toggle('dark', useDark);
        } catch (_) {
          /* no-op */
        }
      })();
    </script>
    <script>
      // Resolve reduce-motion before paint, mirroring the logic in
      // src/lib/reduce-motion.svelte.ts: the app setting ('on'/'off')
      // wins, 'system' (or the legacy boolean false) follows the OS
      // preference. +layout.svelte keeps the class in sync afterwards.
      (function () {
        try {
          var stored = localStorage.getItem('notes-app:settings:v1');
          var setting = stored
            ? JSON.parse(stored)['appearance.reduceMotion']
            : undefined;
          var reduced;
          if (setting === 'on' || setting === true) reduced = true;
          else if (setting === 'off') reduced = false;
          else
            reduced =
              window.matchMedia &&
              window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          document.documentElement.classList.toggle('reduce-motion', reduced);
        } catch (_) {
          /* no-op */
        }
      })();
    </script>
    <script>
      /*
       * No-op stubs for React Fast Refresh globals.
       *
       * @vitejs/plugin-react injects a guard at the top of every .tsx file
       * that reads roughly:
       *
       *   if (import.meta.hot && !window.$RefreshReg$) {
       *     throw new Error("@vitejs/plugin-react can't detect preamble.");
       *   }
       *
       * In a vanilla Vite + React app, plugin-react's transformIndexHtml
       * hook injects a `<script>` that defines those globals and wires up
       * react-refresh. In SvelteKit, HTML is generated by SvelteKit's
       * own pipeline and the plugin's transform doesn't reliably land
       * before the React island's dynamic import, so the guard throws
       * the first time the Excalidraw island loads ("@vitejs/plugin-react
       * can't detect preamble. Something is wrong.").
       *
       * Defining the globals as no-ops satisfies the existence check
       * without enabling actual Fast Refresh. Editing ExcalidrawIsland.tsx
       * triggers a full reload in dev instead of hot-swapping — fine,
       * we don't iterate on that file rapidly, and Excalidraw itself is a
       * black-box dep we never touch from inside.
       *
       * In production, `import.meta.hot` is falsy so the entire guarded
       * block is dead code; these globals are unused there.
       */
      window.$RefreshReg$ = window.$RefreshReg$ || function () {};
      window.$RefreshSig$ =
        window.$RefreshSig$ ||
        function () {
          return function (type) {
            return type;
          };
        };
    </script>
    <script>
      /*
       * Last-ditch bootstrap recovery for WebView asset-loader stalls.
       *
       * The Svelte page has its own retry path once the app entry runs, but a
       * stalled entry chunk means that code never mounts. This inline watchdog
       * is deliberately tiny and bounded: if the document is complete but the
       * body is still blank or only showing the loading placeholder after a
       * generous delay, reload once from a fresh asset request.
       */
      (function () {
        var key = 'mindstream:boot-reloads';
        var maxReloads = 2;
        window.setTimeout(function () {
          try {
            var text =
              document.body && document.body.innerText
                ? document.body.innerText.trim()
                : '';
            if (text && text !== 'Loading…') return;
            var used = Number(sessionStorage.getItem(key) || '0');
            if (used >= maxReloads) return;
            sessionStorage.setItem(key, String(used + 1));
            console.warn('[boot] app shell did not mount; reloading document');
            location.reload();
          } catch (_) {
            /* no-op */
          }
        }, 30000);
      })();
    </script>
    <style>
      /*
       * Bootstrap background colours so the very first paint matches the
       * active theme. app.css, dockview, and Crepe stylesheets all load
       * after this point; without these rules the WebView shows its default
       * white between window-create and CSS-ready, which is a "flashbang"
       * for dark-mode users. Values mirror the --background tokens from
       * app.css verbatim so the cross-fade is invisible.
       */
      :root {
        background-color: oklch(1 0 0);
        color: oklch(0.145 0 0);
      }
      :root.dark {
        background-color: oklch(0.145 0 0);
        color: oklch(0.985 0 0);
      }
    </style>
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="h-full bg-background text-foreground antialiased"
  >
    <div style="display: contents" class="h-full">%sveltekit.body%</div>
  </body>
</html>
