# CI for every push / PR. Four parallel job groups:
#   - js       : svelte-check + vitest + vite build, on all three desktop OSes.
#   - rust     : `cargo test` for the desktop target on all three desktop OSes.
#   - coverage : single-OS (Linux) run that measures vitest (v8) and cargo
#                (llvm-cov) line coverage and publishes both to Codecov so the
#                score / badge / PR comment stay current. Kept separate from the
#                matrix jobs because coverage instrumentation is slower and only
#                needs to run once.
#   - e2e      : Playwright drives the SvelteKit SPA (browser-fallback mode,
#                mock store) on Linux to cover the Svelte components unit tests
#                can't reach.
#
# Android isn't tested here — its build matrix lives in release.yml because
# it needs the NDK (~1.5 GB) and a signing keystore. If you want Android
# smoke-checks on PR, add a `cargo check --target aarch64-linux-android`
# job that reuses the libsodium prebuilts under src-tauri/prebuilt-binaries.

name: Test

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch — saves minutes on rapid pushes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS check + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # `pnpm install` runs the postinstall that generates
      # src-tauri/.cargo/config.toml. On non-Android hosts it just prints a
      # warning (the libsodium prebuilts aren't needed), which is fine.
      - run: pnpm install --frozen-lockfile

      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  rust:
    name: Cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Tauri 2's desktop bundle pulls webkit2gtk-4.1 + libsoup-3.0; the
      # secret-service keyring backend uses the `vendored` feature so we
      # don't need libdbus headers, but the other GUI deps are still
      # required even for `cargo test` because tauri-build runs.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            build-essential curl wget file

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # postinstall generates .cargo/config.toml; without it the
      # [target.*-linux-android.sodium] sections are missing but desktop
      # targets don't care.
      - run: pnpm install --frozen-lockfile

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked

  # Coverage runs once on Linux and uploads two lcov reports to Codecov,
  # tagged with `flags` so the service tracks the frontend and Rust
  # backend percentages independently. Non-blocking: a Codecov hiccup
  # shouldn't fail the build (fail_ci_if_error: false).
  coverage:
    name: Coverage (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            build-essential curl wget file

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@cargo-llvm-cov

      - run: pnpm install --frozen-lockfile

      # Frontend: vitest with the v8 provider emits coverage/lcov.info.
      - name: JS coverage
        run: pnpm test:coverage

      # Backend: cargo-llvm-cov emits src-tauri/lcov.info.
      - name: Rust coverage
        working-directory: src-tauri
        run: cargo llvm-cov --locked --lcov --output-path lcov.info

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload backend coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./src-tauri/lcov.info
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # End-to-end: Playwright builds the SvelteKit SPA and drives it through
  # `vite preview` in browser-fallback mode (no Tauri, no Rust — the
  # in-memory mock store backs every API call). Linux-only; the suite is
  # platform-agnostic so one OS is enough.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
