# Mindstream Notes — backend stack.
#
# Single entrypoint for everything the client talks to:
#   /socket.io/  → excalidraw-room   (freeform live sync)
#   /yjs         → yjs-relay         (markdown + PDF Yjs collab)
#   /            → etebase           (encrypted note storage + auth)
#
# Postgres backs etebase (etebase supports sqlite too but Postgres is
# what the official docs recommend for anything beyond a single user).
#
# Usage from this directory:
#   cp .env.example .env
#   # edit .env — at minimum set POSTGRES_PASSWORD and PUBLIC_HOST
#   docker compose up -d --build
#
# Plain HTTP only. The nginx edge publishes no host port here; put your
# TLS-terminating reverse proxy (Dokploy/Traefik, Caddy, Cloudflare, …)
# in front and route the public hostname to the nginx service on
# container port 80. For local dev without a proxy,
# docker-compose.override.yml publishes nginx on ${NGINX_PORT:-8080}.

# Cap container logs so the json-file driver can't fill the host disk on
# a small VPS. ~30 MB max per container (10 MB × 3 rotated files); older
# lines roll off. Shared by every service via the *default-logging alias.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    build: ./nginx
    container_name: mindstream-nginx
    restart: always
    logging: *default-logging
    depends_on:
      - yjs-relay
      - excalidraw-room
      - etebase
    # No host port published on purpose. Behind a reverse proxy
    # (Dokploy/Traefik, Caddy, …) attach PUBLIC_HOST to this service on
    # container port 80 and let the proxy terminate TLS. Local dev
    # without a proxy gets a published port via docker-compose.override.yml.
    expose:
      - "80"

  yjs-relay:
    build: ./yjs-relay
    container_name: mindstream-yjs-relay
    restart: always
    logging: *default-logging
    environment:
      - HOST=0.0.0.0
      - PORT=1234
    expose:
      - "1234"

  excalidraw-room:
    build: ./excalidraw-room
    container_name: mindstream-excalidraw-room
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=80
      # Same public origin the client loads from — see PUBLIC_ORIGIN in .env.
      - CORS_ORIGIN=${PUBLIC_ORIGIN:-http://localhost:8080}
    expose:
      - "80"

  etebase:
    # victorrds/etebase is the most widely-used community image of the
    # upstream etesync/server repo. It runs uvicorn against the bundled
    # etebase Django app on 3735 and reads its config from /data.
    # Bump the tag below when upstream cuts a new release.
    image: victorrds/etebase:0.14.2-alpine
    container_name: mindstream-etebase
    restart: always
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_ENGINE=postgres
      - DATABASE_NAME=${POSTGRES_DB:-etebase}
      - DATABASE_USER=${POSTGRES_USER:-etebase}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - SUPER_USER=${ETEBASE_SUPER_USER:-admin}
      # SUPER_PASS intentionally omitted — image auto-generates a random
      # password on first boot and prints it to `docker compose logs
      # etebase`. Grab it once, save it in your password manager, then
      # the line is gone. Or set ETEBASE_SUPER_PASS in .env if you want
      # to pin it (less safe; it stays in the env).
      - SUPER_PASS=${ETEBASE_SUPER_PASS:-}
      # Drives both ALLOWED_HOSTS and CSRF_TRUSTED_ORIGINS in the image.
      - ALLOWED_HOSTS=${PUBLIC_HOST:-localhost}
    volumes:
      # /data holds etebase-server.ini, secret.txt, and the media dir
      # (user-uploaded blobs). Keep this volume around — losing it
      # means losing everyone's data.
      - etebase_data:/data
    expose:
      - "3735"

  postgres:
    image: postgres:16-alpine
    container_name: mindstream-postgres
    restart: always
    logging: *default-logging
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-etebase}
      - POSTGRES_USER=${POSTGRES_USER:-etebase}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready -U $POSTGRES_USER` returns 0 once the cluster is
      # accepting connections; etebase blocks on this via depends_on so
      # the migrations don't race a half-started Postgres on first boot.
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etebase} -d ${POSTGRES_DB:-etebase}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  etebase_data:
  postgres_data:
