events {}

http {
  # Forward the WebSocket upgrade header verbatim; the empty-header
  # branch lets normal HTTP requests through with Connection: close.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Trust the reverse proxy in front of us for client-identity headers.
  # TRUSTED_PROXY_CIDR defaults to the RFC1918 ranges a container network
  # lives in; nothing outside them can dictate who it claims to be.
  #
  # This matters twice over: $remote_addr would otherwise be the proxy for
  # every request, so the rate limits below would put all users in one
  # bucket, and a client could append whatever it liked to
  # X-Forwarded-For and poison both the limiter and etebase's audit log.
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  set_real_ip_from 127.0.0.0/8;
  real_ip_header X-Forwarded-For;
  # Walk back past our own proxies to the first address we didn't trust.
  real_ip_recursive on;

  # Honor the scheme an upstream TLS terminator (Dokploy/Traefik, Caddy,
  # …) already determined; fall back to our own $scheme for direct
  # local-dev HTTP. etebase (Django) builds CSRF_TRUSTED_ORIGINS from
  # this — forward http when the real request was https and every
  # state-changing POST 403s with "CSRF Origin checking failed".
  #
  # Only honoured from a trusted proxy: $realip_remote_addr is the peer
  # before real_ip rewriting, so an untrusted direct client can't claim
  # https and slip past Django's CSRF origin check.
  map $http_x_forwarded_proto $forwarded_proto_raw {
    default $http_x_forwarded_proto;
    ''      $scheme;
  }
  map $realip_remote_addr $from_trusted_proxy {
    default            0;
    '~^10\.'           1;
    '~^172\.(1[6-9]|2[0-9]|3[01])\.' 1;
    '~^192\.168\.'    1;
    '~^127\.'         1;
  }
  map $from_trusted_proxy $forwarded_proto {
    1       $forwarded_proto_raw;
    default $scheme;
  }

  # Credential-guessing brake. $binary_remote_addr is the real client
  # thanks to real_ip above. 10r/m with a burst of 20 is far more than a
  # human login flow needs (login is a two-step challenge/response) and
  # far less than a guessing run wants.
  limit_req_zone $binary_remote_addr zone=etebase_auth:10m rate=10r/m;
  # Blanket connection cap. Live collab holds a long-lived WebSocket per
  # open note, so this is generous — it exists to stop one host opening
  # thousands of sockets, not to ration normal use.
  limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
  limit_req_status 429;
  limit_conn_status 429;

  upstream excalidraw_room { server excalidraw-room:80; }
  upstream yjs_relay       { server yjs-relay:1234; }
  upstream etebase         { server etebase:3735; }

  server {
    listen 80;

    # Etebase media uploads (note attachments) need this — the upstream
    # docs recommend 75M. The two WebSocket upstreams don't care.
    client_max_body_size 75M;

    limit_conn conn_per_ip 128;

    # Liveness endpoint for the container healthcheck. Local and cheap —
    # never touches the etebase upstream or ALLOWED_HOSTS, so it reports
    # "nginx is up" without coupling to the rest of the stack.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # socket.io-client appends /socket.io/ to every URL, so we match it
    # explicitly and route to excalidraw-room. The room server registers
    # its handlers at /, which lines up with the appended prefix.
    location /socket.io/ {
      proxy_pass http://excalidraw_room;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_read_timeout 7d;
    }

    # The yjs-relay reads ?room=… from the query string and ignores the
    # path, so the prefix is purely a routing tag for nginx — we keep
    # it on the wire and forward as-is. Prefix-match (no trailing slash
    # on the location) so /yjs?room=… matches without a redirect.
    location /yjs {
      proxy_pass http://yjs_relay;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_read_timeout 7d;
    }

    # Etebase's credential endpoints, rate-limited. Deliberately an exact
    # list rather than the whole /api/v1/authentication/ prefix: that prefix
    # also carries is_etebase/, logout/ and dashboard_url/, none of which are
    # a guessing surface, and throttling them would be collateral damage.
    # A regex location wins over the `/` prefix match below.
    location ~ ^/api/v1/authentication/(login|login_challenge|signup|change_password)/ {
      limit_req zone=etebase_auth burst=20 nodelay;

      proxy_pass http://etebase;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_redirect off;
    }

    # Everything else: etebase. Headers per the upstream production-
    # nginx wiki (X-Real-IP / X-Forwarded-* are what etebase reads to
    # build absolute URLs and to populate the request.META used by
    # rate-limiting and audit logs).
    location / {
      proxy_pass http://etebase;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_redirect off;
    }
  }
}
