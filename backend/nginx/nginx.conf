events {}

http {
  # Forward the WebSocket upgrade header verbatim; the empty-header
  # branch lets normal HTTP requests through with Connection: close.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream excalidraw_room { server excalidraw-room:80; }
  upstream yjs_relay       { server yjs-relay:1234; }

  server {
    listen 80;

    # socket.io-client appends /socket.io/ to every URL, and the
    # excalidraw-room server registers its handlers at /. Path-match
    # here so a client pointed at wss://host/ hits the right upstream
    # without any client-side prefix juggling.
    location /socket.io/ {
      proxy_pass http://excalidraw_room;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 7d;
    }

    # Everything else: yjs-relay. It ignores the path and reads ?room=
    # from the query string, so root-path WebSocket upgrades land here.
    location / {
      proxy_pass http://yjs_relay;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 7d;
    }
  }
}
