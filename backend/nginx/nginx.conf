events {}

http {
  # Forward the WebSocket upgrade header verbatim; the empty-header
  # branch lets normal HTTP requests through with Connection: close.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream excalidraw_room { server excalidraw-room:80; }
  upstream yjs_relay       { server yjs-relay:1234; }
  upstream etebase         { server etebase:3735; }

  server {
    listen 80;

    # Etebase media uploads (note attachments) need this — the upstream
    # docs recommend 75M. The two WebSocket upstreams don't care.
    client_max_body_size 75M;

    # socket.io-client appends /socket.io/ to every URL, so we match it
    # explicitly and route to excalidraw-room. The room server registers
    # its handlers at /, which lines up with the appended prefix.
    location /socket.io/ {
      proxy_pass http://excalidraw_room;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 7d;
    }

    # The yjs-relay reads ?room=… from the query string and ignores the
    # path, so the prefix is purely a routing tag for nginx — we keep
    # it on the wire and forward as-is. Prefix-match (no trailing slash
    # on the location) so /yjs?room=… matches without a redirect.
    location /yjs {
      proxy_pass http://yjs_relay;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 7d;
    }

    # Everything else: etebase. Headers per the upstream production-
    # nginx wiki (X-Real-IP / X-Forwarded-* are what etebase reads to
    # build absolute URLs and to populate the request.META used by
    # rate-limiting and audit logs).
    location / {
      proxy_pass http://etebase;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
    }
  }
}
