[package]
name = "mindstream-notes"
version = "0.1.2"
description = "Local-first modern markdown-based E2EE collaborative note-taking app built with Tauri v2."
authors = ["you"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "mindstream_notes_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
urlencoding = "2"

# Persistence
rusqlite = { version = "0.32", features = ["bundled"] }
thiserror = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock"] }
openssl-sys = { version = "0.9.111", features = ["vendored"] }
openssl = { version = "*", features = ["vendored"] }
etebase = "0.6.1"
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }

# Sync — yrs CRDT for offline-merge-safe documents, similar for diffing
# the editor's "full body" save back into Y.Text ops, rmp-serde for the
# msgpack wire format inside Etebase item content.
yrs = "0.21"
similar = "2"
rmp-serde = "1"
serde_bytes = "0.11"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
incremental = false
opt-level = "s"
strip = true

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-autostart = "2"
