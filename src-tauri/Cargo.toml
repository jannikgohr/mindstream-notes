[package]
name = "tauri-note-taking-app"
version = "0.1.0"
description = "Local-first note-taking app boilerplate built with Tauri v2."
authors = ["you"]
edition = "2021"
rust-version = "1.77"

# The lib name is referenced from main.rs — keep it in sync if you rename it.
[lib]
name = "tauri_note_taking_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
urlencoding = "2"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
incremental = false
opt-level = "s"
strip = true
